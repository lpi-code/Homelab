---
# Talos Kubernetes Cluster Configuration — Local Environment
# Variable names must match the direct_mappings keys in shared/scripts/get-ansible-vars.py
# so that Terraform picks them up via data.external.ansible_vars.

cluster_name: "homelab-local"
talos_version: "1.11.1"
proxmox_node: "pve02"
talos_storage_pool: "local-zfs"

# Control plane — 1 node for local dev
control_plane_count: 1
control_plane_ips:
  - "10.10.0.10"
control_plane_vm_ids:
  - 3000
control_plane_cores: 2
control_plane_memory: 4096
control_plane_disk_size: "10G"
# Tunnel: localhost:5802 → 10.10.0.10:50000 (via PVE SSH forward in 03b-deploy-cluster.sh)
control_plane_tunnel_ports:
  - 5802

# Workers — 2 nodes for local dev
worker_count: 2
worker_ips:
  - "10.10.0.20"
  - "10.10.0.21"
worker_vm_ids:
  - 3100
  - 3101
worker_cores: 2
worker_memory: 4096
worker_disk_size: "10G"
# Tunnels: localhost:5803 → 10.10.0.20:50000, localhost:5804 → 10.10.0.21:50000
worker_tunnel_ports:
  - 5803
  - 5804
